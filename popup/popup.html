<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Page Translator</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <h1>Page Translator</h1>
  </header>

  <main>
    <label for="target-lang">Target language</label>
    <select id="target-lang">
      <option value="en">English</option>
      <option value="de">German</option>
      <option value="fr">French</option>
      <option value="es">Spanish</option>
      <option value="it">Italian</option>
      <option value="pt">Portuguese</option>
      <option value="nl">Dutch</option>
      <option value="pl">Polish</option>
      <option value="ru">Russian</option>
      <option value="ja">Japanese</option>
      <option value="zh">Chinese</option>
      <option value="ko">Korean</option>
    </select>

    <button id="translate-btn" class="primary">Translate</button>
    <button id="restore-btn" class="secondary">Restore original</button>

    <p id="status" class="status idle">Idle.</p>
    <p id="banner" class="banner" hidden></p>
  </main>

  <script src="popup.js"></script>
</body>
</html>
